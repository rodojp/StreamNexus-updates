name: Bug report
description: Report a reproducible problem in StreamNexus.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve StreamNexus. Do not include access tokens, passwords, email addresses, or unredacted logs.
  - type: input
    id: version
    attributes:
      label: StreamNexus version
      placeholder: 0.1.20-beta.3
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or redacted diagnostic information if useful.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed tokens, passwords, email addresses, and other personal information.
          required: true
