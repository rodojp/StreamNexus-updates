<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">StreamNexus Revocation and Local Deletion Flow</title>
  <desc id="desc">Detailed flow for POST /api/youtube/auth/logout, Google token revoke endpoint, local token clearing, DELETE /api/youtube/authorized-data, and retry behavior on revoke failure.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 40px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 20px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .app { fill: #ecfeff; stroke: #0891b2; }
      .google { fill: #eef2ff; stroke: #4f46e5; }
      .success { fill: #f0fdf4; stroke: #16a34a; }
      .danger { fill: #fff1f2; stroke: #e11d48; }
      .label { fill: #0f172a; font: 700 19px Arial, sans-serif; }
      .small { fill: #475569; font: 400 14px Arial, sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .fail { stroke: #e11d48; stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .note { fill: #334155; font: 700 17px Arial, sans-serif; }
      .tiny { fill: #64748b; font: 400 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>
  <text class="title" x="64" y="70">StreamNexus Revocation and Local Deletion Flow</text>
  <text class="subtitle" x="64" y="105">Programmatic Google token revocation and YouTube Authorized Data deletion in the local desktop app.</text>

  <rect class="box app" x="80" y="180" width="285" height="110" rx="10"/>
  <text class="label" x="124" y="225">User clicks Disconnect</text>
  <text class="small" x="124" y="254">Linked Accounts settings</text>

  <rect class="box app" x="455" y="180" width="300" height="110" rx="10"/>
  <text class="label" x="500" y="225">Confirm action</text>
  <text class="small" x="500" y="254">Explains Google token revoke</text>

  <rect class="box app" x="845" y="180" width="330" height="110" rx="10"/>
  <text class="label" x="895" y="225">POST /api/youtube/auth/logout</text>
  <text class="small" x="895" y="254">Local Fastify backend</text>

  <rect class="box app" x="845" y="360" width="330" height="120" rx="10"/>
  <text class="label" x="890" y="405">Select stored token</text>
  <text class="small" x="890" y="434">Prefer refresh token</text>
  <text class="small" x="890" y="456">Fallback to access token</text>

  <rect class="box google" x="1240" y="360" width="330" height="120" rx="10"/>
  <text class="label" x="1280" y="405">Google revoke endpoint</text>
  <text class="small" x="1280" y="434">https://oauth2.googleapis.com/revoke</text>
  <text class="small" x="1280" y="456">token form parameter</text>

  <rect class="box success" x="845" y="565" width="330" height="120" rx="10"/>
  <text class="label" x="902" y="610">Clear local tokens</text>
  <text class="small" x="902" y="639">Encrypted settings emptied</text>
  <text class="small" x="902" y="661">Auth state refreshed</text>

  <rect class="box danger" x="1240" y="565" width="330" height="120" rx="10"/>
  <text class="label" x="1288" y="610">Revoke failure</text>
  <text class="small" x="1288" y="639">Keep local tokens for retry</text>
  <text class="small" x="1288" y="661">Show user-visible error</text>

  <rect class="box app" x="80" y="760" width="350" height="120" rx="10"/>
  <text class="label" x="126" y="805">User clicks Save Data Delete</text>
  <text class="small" x="126" y="834">Settings deletion workflow</text>

  <rect class="box app" x="520" y="760" width="360" height="120" rx="10"/>
  <text class="label" x="555" y="805">DELETE /api/youtube/authorized-data</text>
  <text class="small" x="555" y="834">Runs revoke if token remains</text>

  <rect class="box success" x="970" y="760" width="475" height="120" rx="10"/>
  <text class="label" x="1015" y="805">Delete local YouTube Authorized Data</text>
  <text class="small" x="1015" y="834">tracked_channels, stream_history, watch_sessions</text>
  <text class="small" x="1015" y="856">stream_notes, claim_history rows where platform = youtube</text>

  <path class="arrow" d="M365 235 H455"/>
  <path class="arrow" d="M755 235 H845"/>
  <path class="arrow" d="M1010 290 V360"/>
  <path class="arrow" d="M1175 420 H1240"/>
  <path class="arrow" d="M1405 480 C1405 535 1175 535 1175 625"/>
  <path class="fail" d="M1405 480 V565"/>
  <path class="arrow" d="M430 820 H520"/>
  <path class="arrow" d="M880 820 H970"/>
  <path class="arrow" d="M700 760 C700 650 845 650 845 625"/>

  <text class="note" x="82" y="945">Success behavior</text>
  <text class="tiny" x="82" y="970">200 from Google revoke means the token was revoked. 400 invalid token is treated as already invalid, then local tokens can be cleared.</text>
  <text class="note" x="900" y="945">Failure behavior</text>
  <text class="tiny" x="900" y="970">Network or server failures keep local tokens so the user can retry revocation.</text>
</svg>
