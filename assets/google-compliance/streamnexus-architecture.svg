<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">StreamNexus Google and YouTube Compliance Architecture</title>
  <desc id="desc">Architecture diagram showing local StreamNexus components, Google OAuth, YouTube Data API, Access Gate Worker, local SQLite, encrypted settings, and GitHub Releases distribution.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 40px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 20px Arial, sans-serif; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .group-title { fill: #334155; font: 700 22px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .box-app { fill: #ecfeff; stroke: #0891b2; }
      .box-google { fill: #eef2ff; stroke: #4f46e5; }
      .box-store { fill: #f0fdf4; stroke: #16a34a; }
      .box-public { fill: #fff7ed; stroke: #ea580c; }
      .label { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .small { fill: #475569; font: 400 14px Arial, sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .note { fill: #64748b; font: 400 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="950"/>
  <text class="title" x="64" y="70">StreamNexus Architecture for Google / YouTube Compliance</text>
  <text class="subtitle" x="64" y="105">Local desktop app, encrypted local storage, Google OAuth revocation, YouTube Data API read-only usage, and release distribution.</text>

  <rect class="group" x="56" y="150" width="920" height="650" rx="18"/>
  <text class="group-title" x="86" y="190">User device: Windows desktop</text>

  <rect class="box box-app" x="100" y="245" width="210" height="90" rx="10"/>
  <text class="label" x="132" y="286">User</text>
  <text class="small" x="132" y="313">Uses StreamNexus</text>

  <rect class="box box-app" x="390" y="225" width="275" height="120" rx="10"/>
  <text class="label" x="430" y="275">StreamNexus Electron</text>
  <text class="small" x="430" y="302">App shell and lifecycle</text>

  <rect class="box box-app" x="390" y="400" width="275" height="115" rx="10"/>
  <text class="label" x="425" y="448">React renderer UI</text>
  <text class="small" x="425" y="476">Policy, settings, channel UI</text>

  <rect class="box box-app" x="390" y="575" width="275" height="115" rx="10"/>
  <text class="label" x="425" y="623">Electron main process</text>
  <text class="small" x="425" y="651">Local app orchestration</text>

  <rect class="box box-app" x="745" y="390" width="250" height="140" rx="10"/>
  <text class="label" x="790" y="440">Local Fastify API</text>
  <text class="small" x="790" y="468">localhost backend</text>
  <text class="small" x="790" y="492">OAuth routes and data routes</text>

  <rect class="box box-store" x="745" y="610" width="250" height="100" rx="10"/>
  <text class="label" x="790" y="651">Encrypted settings</text>
  <text class="small" x="790" y="679">Access and refresh tokens</text>

  <rect class="box box-store" x="745" y="735" width="250" height="100" rx="10"/>
  <text class="label" x="825" y="776">SQLite</text>
  <text class="small" x="790" y="804">Tracked channels and history</text>

  <rect class="group" x="1050" y="150" width="490" height="465" rx="18"/>
  <text class="group-title" x="1082" y="190">Google / YouTube services</text>

  <rect class="box box-google" x="1110" y="240" width="320" height="100" rx="10"/>
  <text class="label" x="1160" y="282">Google OAuth</text>
  <text class="small" x="1160" y="310">Consent, token exchange, revoke</text>

  <rect class="box box-google" x="1110" y="395" width="320" height="100" rx="10"/>
  <text class="label" x="1148" y="437">YouTube Data API v3</text>
  <text class="small" x="1148" y="465">youtube.readonly only</text>

  <rect class="box box-google" x="1110" y="520" width="320" height="80" rx="10"/>
  <text class="label" x="1168" y="565">Google Permissions</text>
  <text class="small" x="1168" y="588">Third-party access page</text>

  <rect class="group" x="1050" y="650" width="490" height="220" rx="18"/>
  <text class="group-title" x="1082" y="690">Access gate and distribution</text>

  <rect class="box box-google" x="1080" y="720" width="230" height="80" rx="10"/>
  <text class="label" x="1124" y="753">Access Gate Worker</text>
  <text class="small" x="1124" y="779">Cloudflare Worker</text>

  <rect class="box box-store" x="1340" y="720" width="150" height="80" rx="10"/>
  <text class="label" x="1383" y="753">D1 DB</text>
  <text class="small" x="1370" y="779">Allowlist</text>

  <rect class="box box-public" x="1080" y="815" width="490" height="70" rx="10"/>
  <text class="label" x="1135" y="858">GitHub Releases: rodojp/StreamNexus-updates</text>

  <path class="arrow" d="M310 290 H390"/>
  <path class="arrow" d="M528 345 V400"/>
  <path class="arrow" d="M528 575 V515"/>
  <path class="arrow" d="M665 458 H745"/>
  <path class="arrow" d="M870 530 V610"/>
  <path class="arrow" d="M870 530 V735"/>
  <path class="arrow" d="M995 430 C1035 410 1060 330 1110 300"/>
  <path class="arrow" d="M995 455 H1110"/>
  <path class="arrow" d="M665 635 C850 660 960 720 1080 760"/>
  <path class="arrow" d="M1310 760 H1340"/>

  <text class="note" x="1025" y="365">Token endpoint / revoke endpoint</text>
  <text class="note" x="1018" y="520">Subscriptions and public video metadata</text>
  <text class="note" x="790" y="585">Stored locally only</text>
  <text class="note" x="64" y="895">App name for OAuth and public materials: StreamNexus. YouTube OAuth scope: https://www.googleapis.com/auth/youtube.readonly</text>
</svg>
